name: notify

on:
  schedule:
    # GitHub Actions の schedule は高負荷時に1〜3時間遅延するため、
    # 22:00 JST (13:00 UTC) より早めの半端な分に起動し、
    # ジョブ内の "Wait until 22:00 JST" ステップで配信時刻まで待つ
    - cron: "23 10 * * *" # 10:23 UTC = 19:23 JST に起動
  workflow_dispatch:
    inputs:
      seed_recent:
        description: "初期シード: 各チャンネル直近N本のみ要約し残りは既読登録(空欄=通常実行)"
        required: false
        default: ""

permissions:
  contents: write

concurrency:
  group: notify
  cancel-in-progress: false

jobs:
  notify:
    runs-on: ubuntu-latest
    timeout-minutes: 240
    steps:
      - name: Wait until 22:00 JST
        if: github.event_name == 'schedule'
        run: |
          target=$(date -u -d "today 13:00" +%s)
          now=$(date -u +%s)
          if [ "$now" -lt "$target" ]; then
            echo "waiting $((target - now)) seconds until 13:00 UTC (22:00 JST)"
            sleep $((target - now))
          else
            echo "already past 13:00 UTC, running immediately"
          fi

      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run pipeline
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GMAIL_ADDRESS: ${{ secrets.GMAIL_ADDRESS }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          SEED_RECENT: ${{ github.event.inputs.seed_recent }}
        run: |
          if [ -n "$SEED_RECENT" ]; then
            python -m app.seed --recent "$SEED_RECENT"
          else
            python -m app.run
          fi

      - name: Commit seen state
        run: |
          if git diff --quiet -- state/seen.json; then
            echo "no state changes"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add state/seen.json
          git commit -m "chore(state): update seen.json [skip ci]"
          git push
