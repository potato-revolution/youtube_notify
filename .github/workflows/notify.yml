name: notify

on:
  schedule:
    - cron: "0 13 * * *" # 22:00 JST
  workflow_dispatch:
    inputs:
      seed_recent:
        description: "初期シード: 各チャンネル直近N本のみ要約し残りは既読登録(空欄=通常実行)"
        required: false
        default: ""

permissions:
  contents: write

concurrency:
  group: notify
  cancel-in-progress: false

jobs:
  notify:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run pipeline
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GMAIL_ADDRESS: ${{ secrets.GMAIL_ADDRESS }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          SEED_RECENT: ${{ github.event.inputs.seed_recent }}
        run: |
          if [ -n "$SEED_RECENT" ]; then
            python -m app.seed --recent "$SEED_RECENT"
          else
            python -m app.run
          fi

      - name: Commit seen state
        run: |
          if git diff --quiet -- state/seen.json; then
            echo "no state changes"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add state/seen.json
          git commit -m "chore(state): update seen.json [skip ci]"
          git push
